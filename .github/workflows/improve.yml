name: Self-Improving AI

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Improvement Script
        run: node scripts/improve.js

      - name: Commit and Push Changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@selfimprove.dev"
          git add lib/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 AI self-improvement $(date -u +'%Y-%m-%d %H:%M')"
            git push
          fi
