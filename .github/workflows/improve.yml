name: AI Training & Improvement

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  train-and-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: 🧠 Train Neural Network (10 min)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/train.js
        timeout-minutes: 12

      - name: 📊 Evaluate & Reward
        run: node scripts/improve.js

      - name: Commit trained brain
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@selfimprove.dev"
          
          # Pull latest changes first to avoid conflicts
          git pull origin main --rebase || git pull origin main
          
          git add lib/brain_weights.json lib/vocab.json lib/state.json lib/training_data.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🧠 Neural network training $(date -u +'%Y-%m-%d %H:%M')"
            git push origin main || (
              echo "Push failed, pulling and retrying..."
              git pull origin main --rebase
              git push origin main
            )
          fi
