name: AI Continuous Training

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["AI Continuous Training"]
    types:
      - completed

jobs:
  train-and-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: 🧠 Multi-Model Training
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/train.js
        timeout-minutes: 12

      - name: 📊 Evaluate
        run: node scripts/improve.js

      - name: Commit & Push
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@selfimprove.dev"
          git pull origin main --rebase || git pull origin main
          git add lib/brain_weights.json lib/vocab.json lib/state.json lib/training_data.json lib/rankings.json lib/self_talk.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🧠 Training $(date -u +'%H:%M')"
            git push origin main || (git pull origin main --rebase && git push origin main)
          fi

      - name: Trigger Next Training
        if: success()
        run: |
          sleep 30
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/improve.yml/dispatches" \
            -d '{"ref":"main"}'
