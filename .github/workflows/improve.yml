name: AI Continuous Training

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  train-and-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: 🧠 Training
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/train.js
        timeout-minutes: 12

      - name: 📊 Evaluate
        run: node scripts/improve.js

      - name: Commit to training branch
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@selfimprove.dev"
          
          # Create or switch to training branch
          git checkout training 2>/dev/null || git checkout -b training
          
          # Merge main into training (keep training up to date)
          git merge main -m "Merge main into training" 2>/dev/null || true
          
          # Add all training files
          git add lib/brain_weights.json lib/vocab.json lib/state.json \
                  lib/training_data.json lib/rankings.json lib/self_talk.json \
                  lib/uncertain_questions.json lib/conversation_log.json
          
          # Commit if changes exist
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🧠 Training $(date -u +'%H:%M')"
            git push origin training --force
          fi

      - name: Check if should merge to main
        run: |
          # Check if quality improved
          node -e "
            const state = JSON.parse(require('fs').readFileSync('lib/state.json','utf-8'));
            const shouldMerge = state.averageRanking && state.averageRanking >= 5;
            console.log('Should merge:', shouldMerge);
            require('fs').writeFileSync('/tmp/should_merge', shouldMerge ? 'true' : 'false');
          "
          
          SHOULD_MERGE=$(cat /tmp/should_merge)
          
          if [ "$SHOULD_MERGE" = "true" ]; then
            echo "✅ Quality good, merging to main..."
            git checkout main
            git merge training -m "🤖 Merge improved brain"
            git push origin main
          else
            echo "⏳ Quality not high enough, keeping in training branch only"
          fi

      - name: Trigger Next Cycle
        if: success()
        run: |
          sleep 10
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/improve.yml/dispatches" \
            -d '{"ref":"main"}'
