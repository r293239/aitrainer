name: Keep Training Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check Training Status
        run: node scripts/keep-alive.js

      - name: Trigger Training if Overdue
        run: |
          OVERDUE=$(node -e "const s=JSON.parse(require('fs').readFileSync('lib/state.json','utf-8')); console.log(s.trainingOverdue ? 'true' : 'false')")
          if [ "$OVERDUE" = "true" ]; then
            echo "⚠️ Training overdue, triggering..."
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/improve.yml/dispatches" \
              -d @- <<'EOF'
            {"ref":"main"}
            EOF
          else
            echo "✅ Training is active"
          fi

      - name: Commit Status
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@selfimprove.dev"
          git pull origin main --rebase || true
          git add lib/state.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Keep-alive"
            git push origin main || true
          fi
