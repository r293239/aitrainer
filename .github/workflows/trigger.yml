name: Training Trigger

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  trigger-training:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger Training
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/improve.yml/dispatches" \
            -d @- <<'EOF'
          {"ref":"main"}
          EOF
          echo "✅ Training triggered"
