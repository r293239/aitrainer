<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♔ Chess AI Training Arena ♛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #00ff88;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ff88;
            letter-spacing: 3px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .stat-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .progress-section {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #444;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px #00ff88;
        }

        .live-games {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-mini {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
        }

        .game-mini.active {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 12px;
        }

        .game-moves {
            font-size: 11px;
            color: #00ff88;
            max-height: 60px;
            overflow-y: auto;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 30px #00ff88;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .learning-chart {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #444;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            height: 200px;
            position: relative;
        }

        .console-output {
            background: #000;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            color: #00ff88;
        }

        .console-line {
            margin: 2px 0;
        }

        .console-line.warning {
            color: #ffaa00;
        }

        .console-line.error {
            color: #ff4444;
        }

        .console-line.success {
            color: #00ff88;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
        }

        .status-badge.running {
            background: #00ff88;
            color: #000;
        }

        .status-badge.completed {
            background: #444;
            color: #888;
        }

        .export-section {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♔ SELF-PLAY TRAINING ARENA ♛</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Generation</div>
                <div class="stat-value" id="gen-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Games Played</div>
                <div class="stat-value" id="games-played">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Best Win Rate</div>
                <div class="stat-value" id="best-winrate">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Game Length</div>
                <div class="stat-value" id="avg-moves">0</div>
            </div>
        </div>

        <div class="progress-section">
            <div style="display: flex; justify-content: space-between;">
                <span>Training Progress</span>
                <span id="progress-text">0/100 Games</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <span>⚪ White Wins: <span id="white-wins">0</span></span>
                <span>🤝 Draws: <span id="draws">0</span></span>
                <span>⚫ Black Wins: <span id="black-wins">0</span></span>
            </div>
        </div>

        <div class="live-games" id="live-games">
            <!-- Live game cards will be inserted here -->
        </div>

        <div class="controls">
            <button class="btn" id="btn-start" onclick="startTraining()">▶ Start Training</button>
            <button class="btn" id="btn-pause" onclick="pauseTraining()" disabled>⏸ Pause</button>
            <button class="btn" id="btn-reset" onclick="resetTraining()">🔄 Reset</button>
        </div>

        <div class="learning-chart">
            <h3 style="margin-bottom: 15px;">📊 Learning Progress</h3>
            <div class="chart-container" id="chart-container">
                <canvas id="learning-chart" width="1200" height="200"></canvas>
            </div>
        </div>

        <div class="export-section">
            <button class="btn btn-small" onclick="exportOpenings()">📖 Export Openings</button>
            <button class="btn btn-small" onclick="exportEvaluations()">📊 Export Evaluations</button>
            <button class="btn btn-small" onclick="exportGames()">🎮 Export Games</button>
            <button class="btn btn-small" onclick="exportWeights()">🧠 Export Weights</button>
        </div>

        <div class="console-output" id="console-output">
            <div class="console-line success">[System] Training Arena initialized</div>
            <div class="console-line">[System] Ready to start training</div>
        </div>
    </div>

    <script src="trainer.js"></script>
</body>
</html>
