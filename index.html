<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess AI Self-Play Trainer - Parallel</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: monospace;
            padding: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat {
            background: #1a1a2e;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }
        button {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        button.export {
            background: #444;
            color: #00ff88;
            padding: 10px 20px;
            font-size: 14px;
        }
        button.view-board {
            background: #3366cc;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }
        #log {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            font-size: 12px;
            border: 1px solid #333;
            margin-top: 20px;
        }
        .log-line {
            margin: 2px 0;
        }
        .win { color: #00ff88; }
        .loss { color: #ff4444; }
        .draw { color: #ffaa00; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #00ff88;
            width: 0%;
            transition: width 0.3s;
        }
        .export-section {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
        }
        .worker-status {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .worker {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            background: #444;
        }
        .worker.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
        .worker.completed {
            background: #00aa55;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .game-card {
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
        }
        .game-card.active {
            border-color: #00ff88;
        }
        .game-card.completed {
            border-color: #00aa55;
            opacity: 0.7;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .game-board-mini {
            font-family: monospace;
            font-size: 8px;
            line-height: 1.2;
            background: #0a0a0a;
            padding: 5px;
            border-radius: 4px;
            margin: 5px 0;
        }
        .board-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            border: 3px solid #00ff88;
            border-radius: 15px;
            padding: 20px;
            z-index: 1000;
            display: none;
        }
        .board-modal.active {
            display: block;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: none;
        }
        .modal-overlay.active {
            display: block;
        }
        .board-large {
            font-family: monospace;
            font-size: 20px;
            line-height: 1.4;
            text-align: center;
        }
        .close-btn {
            margin-top: 15px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <h1>♔ Chess AI Self-Play Trainer (Parallel) ♛</h1>
    
    <div class="stats">
        <div class="stat">
            <div>Games Completed</div>
            <div class="stat-value" id="games-completed">0</div>
        </div>
        <div class="stat">
            <div>Total Games</div>
            <div class="stat-value" id="total-games">100</div>
        </div>
        <div class="stat">
            <div>White Wins</div>
            <div class="stat-value" style="color: #fff;" id="white-wins">0</div>
        </div>
        <div class="stat">
            <div>Draws</div>
            <div class="stat-value" style="color: #ffaa00;" id="draws">0</div>
        </div>
        <div class="stat">
            <div>Black Wins</div>
            <div class="stat-value" style="color: #888;" id="black-wins">0</div>
        </div>
        <div class="stat">
            <div>Active Workers</div>
            <div class="stat-value" id="active-workers">0</div>
        </div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div style="display: flex; justify-content: space-between;">
        <span id="progress-text">0/100 Games</span>
        <span id="elapsed-time">00:00</span>
    </div>
    
    <div class="worker-status" id="worker-status"></div>
    
    <div style="margin-top: 20px;">
        <button id="btn-start" onclick="startParallelTraining()">▶ Start 100 Parallel Games</button>
        <button id="btn-stop" onclick="stopTraining()" disabled>⏹ Stop</button>
        <button onclick="resetTraining()">🔄 Reset</button>
    </div>
    
    <h3>🎮 Live Games</h3>
    <div class="games-grid" id="games-grid">
        <!-- Game cards will appear here -->
    </div>
    
    <div class="export-section">
        <h3>📦 Export Training Data</h3>
        <button class="export" onclick="exportOpenings()">📖 Export Openings (JSON)</button>
        <button class="export" onclick="exportEvaluations()">📊 Export Evaluations (CSV)</button>
        <button class="export" onclick="exportGames()">🎮 Export Games (PGN)</button>
        <button class="export" onclick="exportAll()">📦 Export All Data</button>
    </div>
    
    <div id="log">
        <div class="log-line">[System] Parallel Trainer initialized</div>
        <div class="log-line">[System] Ready to run 100 games simultaneously</div>
    </div>
    
    <div class="modal-overlay" id="modal-overlay" onclick="closeBoardModal()"></div>
    <div class="board-modal" id="board-modal">
        <h3 id="modal-title">Game #1</h3>
        <div id="modal-status"></div>
        <div class="board-large" id="modal-board"></div>
        <div id="modal-eval"></div>
        <button class="close-btn" onclick="closeBoardModal()">Close</button>
    </div>

    <script src="chess-engine.js"></script>
    <script src="trainer.js"></script>
</body>
</html>
